<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports Generator | Football Analytics</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Azeret+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #12182b;
            --bg-tertiary: #1a2236;
            --accent-primary: #00ff88;
            --accent-secondary: #00d4ff;
            --accent-danger: #ff4466;
            --accent-warning: #ffaa00;
            --text-primary: #ffffff;
            --text-secondary: #8892b0;
            --text-muted: #495670;
            --border-color: #2a3351;
            --shadow-glow: 0 0 20px rgba(0, 255, 136, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Azeret Mono', monospace;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #0f1424 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        /* Login Screen */
        .login-screen {
            max-width: 450px;
            margin: 8rem auto;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 3rem;
            box-shadow: var(--shadow-glow);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .login-screen h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        label.optional::after {
            content: ' (опционально)';
            color: var(--text-muted);
            text-transform: lowercase;
            font-style: italic;
        }

        input, select, textarea {
            width: 100%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.875rem 1rem;
            color: var(--text-primary);
            font-family: 'Azeret Mono', monospace;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.1);
        }

        /* Buttons */
        .btn {
            padding: 0.875rem 1.75rem;
            border: none;
            border-radius: 8px;
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), #00cc77);
            color: var(--bg-primary);
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.4);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--bg-secondary);
            border-color: var(--accent-secondary);
        }

        .btn-danger {
            background: var(--accent-danger);
            color: white;
        }

        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Server Selector */
        .server-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            background: var(--bg-secondary);
            padding: 0.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .server-option {
            flex: 1;
            padding: 1rem;
            background: transparent;
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .server-option:hover {
            background: var(--bg-tertiary);
        }

        .server-option.active {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.1), rgba(0, 212, 255, 0.1));
            border-color: var(--accent-primary);
        }

        .server-name {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
        }

        .server-url {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 2rem;
            animation: fadeIn 0.6s ease-out 0.2s both;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: var(--shadow-glow);
        }

        .panel-header {
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
        }

        /* Report Form */
        #reportForm {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Reports List */
        .reports-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-height: 70vh;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .reports-list::-webkit-scrollbar {
            width: 6px;
        }

        .reports-list::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
            border-radius: 3px;
        }

        .reports-list::-webkit-scrollbar-thumb {
            background: var(--accent-primary);
            border-radius: 3px;
        }

        .report-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .report-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--accent-primary);
            transition: width 0.3s ease;
        }

        .report-card:hover {
            border-color: var(--accent-primary);
            transform: translateX(4px);
        }

        .report-card:hover::before {
            width: 6px;
        }

        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .report-title {
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .report-status {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-done {
            background: rgba(0, 255, 136, 0.2);
            color: var(--accent-primary);
        }

        .status-in-progress {
            background: rgba(0, 212, 255, 0.2);
            color: var(--accent-secondary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .status-error {
            background: rgba(255, 68, 102, 0.2);
            color: var(--accent-danger);
        }

        .status-archive {
            background: rgba(255, 170, 0, 0.2);
            color: var(--accent-warning);
        }

        .report-details {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .report-hash {
            font-family: 'Azeret Mono', monospace;
            color: var(--text-muted);
            font-size: 0.75rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .report-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        /* Copy Link Section */
        .copy-link-section {
            background: var(--bg-tertiary);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1.5rem;
        }

        .copy-link-section h3 {
            font-family: 'Syne', sans-serif;
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
            color: var(--text-secondary);
        }

        .link-display {
            display: flex;
            gap: 0.5rem;
        }

        .link-display input {
            flex: 1;
            font-size: 0.8rem;
            padding: 0.625rem;
        }

        /* Toast Notifications */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--accent-primary);
            border-radius: 8px;
            padding: 1rem 1.5rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            animation: slideInRight 0.3s ease-out;
            z-index: 1000;
            max-width: 400px;
        }

        @keyframes slideInRight {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .toast.error {
            border-left-color: var(--accent-danger);
        }

        .toast.success {
            border-left-color: var(--accent-primary);
        }

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .panel {
                padding: 1.5rem;
            }

            .login-screen {
                margin: 4rem auto;
                padding: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-screen">
        <h2>🔐 Авторизация</h2>
        <div class="form-group">
            <label for="passwordInput">Пароль</label>
            <input type="password" id="passwordInput" placeholder="Введите пароль" autocomplete="current-password" onkeydown="if(event.key==='Enter') login()">
        </div>
        <button class="btn btn-primary" style="width: 100%;" onclick="login()">Войти</button>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="hidden">
        <div class="container">
            <header>
                <h1>⚽ Reports Generator</h1>
                <p class="subtitle">Football Analytics Platform</p>
            </header>

            <!-- Server Selector -->
            <div class="server-selector">
                <div class="server-option active" onclick="selectServer('WORLD')" data-server="WORLD">
                    <div class="server-name">🌍 WORLD</div>
                    <div class="server-url">api-reports.rustat-service.ru</div>
                </div>
                <div class="server-option" onclick="selectServer('RU')" data-server="RU">
                    <div class="server-name">🇷🇺 RU</div>
                    <div class="server-url">proxy.api-reports.rustat-service.ru</div>
                </div>
            </div>

            <div class="main-grid">
                <!-- Left Panel: Report Form -->
                <div class="panel">
                    <div class="panel-header">Создать отчет</div>
                    
                    <form id="reportForm" onsubmit="generateReport(event)">
                        <div class="form-group">
                            <label for="reportType">Тип отчета</label>
                            <select id="reportType" onchange="updateForm()" required>
                                <option value="">Выберите тип отчета...</option>
                            </select>
                        </div>

                        <div id="dynamicFields"></div>

                        <button type="submit" class="btn btn-primary" style="width: 100%;">
                            Сгенерировать отчет
                        </button>
                    </form>

                    <!-- Copy Direct Link -->
                    <div class="copy-link-section">
                        <h3>Прямая ссылка (legacy)</h3>
                        <div class="link-display">
                            <input type="text" id="directLink" readonly placeholder="Заполните форму для генерации ссылки">
                            <button class="btn btn-secondary btn-small" onclick="copyDirectLink()">Копировать</button>
                        </div>
                    </div>
                </div>

                <!-- Right Panel: Reports List -->
                <div class="panel">
                    <div class="panel-header">
                        Очередь отчетов
                        <span style="float: right; font-size: 0.9rem; color: var(--text-muted);">
                            <span class="spinner"></span> Авто-обновление
                        </span>
                    </div>
                    
                    <div id="reportsList" class="reports-list">
                        <div class="empty-state">
                            <div class="empty-state-icon">📊</div>
                            <p>Отчеты появятся здесь после генерации</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const CONFIG = {
            WORKER_URL: 'https://reports.dhnf11.workers.dev',
            REPORTS_CONFIG_URL: 'https://minio.sportsvideohost.com/media/reports/reports-config_new.json',
            MINIO_BASE: 'https://minio1.sportsvideohost.com',
            LEGACY_BASE: 'http://reports.rustat-service.ru/pdf/report.php',
            POLL_INTERVAL: 30000 // 30 seconds
        };

        // State
        let state = {
            password: '',
            selectedServer: 'WORLD',
            reportsConfig: null,
            reports: new Map(),
            pollInterval: null
        };

        // Initialize
        async function init() {
            try {
                const response = await fetch(CONFIG.REPORTS_CONFIG_URL);
                const config = await response.json();
                state.reportsConfig = config.find(s => s.sport === 'football');
                
                if (state.reportsConfig) {
                    populateReportTypes();
                }
            } catch (error) {
                showToast('Ошибка загрузки конфигурации: ' + error.message, 'error');
            }
        }

        // Login
        async function login() {
            const password = document.getElementById('passwordInput').value;
            if (!password) {
                showToast('Введите пароль', 'error');
                return;
            }

            const btn = document.querySelector('#loginScreen .btn-primary');
            btn.disabled = true;
            btn.textContent = 'Проверка...';

            try {
                const response = await fetch(`${CONFIG.WORKER_URL}/ping`, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${password}` }
                });

                if (response.status === 401) {
                    showToast('Неверный пароль', 'error');
                    return;
                }

                if (!response.ok) {
                    showToast('Ошибка сервера: ' + response.status, 'error');
                    return;
                }

                state.password = password;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');

                init();
                startPolling();

            } catch (error) {
                showToast('Не удалось подключиться к серверу', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Войти';
            }
        }

        // Server Selection
        function selectServer(server) {
            state.selectedServer = server;
            document.querySelectorAll('.server-option').forEach(el => {
                el.classList.toggle('active', el.dataset.server === server);
            });
        }

        // Populate Report Types
        function populateReportTypes() {
            const select = document.getElementById('reportType');
            select.innerHTML = '<option value="">Выберите тип отчета...</option>';
            
            state.reportsConfig.reports.forEach(report => {
                const option = document.createElement('option');
                option.value = report.alias;
                option.textContent = `${report.alias} (.${report.ext})`;
                select.appendChild(option);
            });
        }

        // Update Form Fields
        function updateForm() {
            const alias = document.getElementById('reportType').value;
            const dynamicFields = document.getElementById('dynamicFields');
            dynamicFields.innerHTML = '';

            if (!alias) {
                document.getElementById('directLink').value = '';
                return;
            }

            const report = state.reportsConfig.reports.find(r => r.alias === alias);
            if (!report) return;

            // Required fields
            Object.entries(report.required).forEach(([key, type]) => {
                if (key === 'sport' || key === 'type') return; // Skip auto-filled fields
                
                const fieldHtml = createField(key, type, false);
                dynamicFields.insertAdjacentHTML('beforeend', fieldHtml);
            });

            // Optional fields
            if (report.optional) {
                Object.entries(report.optional).forEach(([key, type]) => {
                    const fieldHtml = createField(key, type, true);
                    dynamicFields.insertAdjacentHTML('beforeend', fieldHtml);
                });
            }

            // Add change listeners for direct link generation
            dynamicFields.querySelectorAll('input, select').forEach(el => {
                el.addEventListener('input', updateDirectLink);
            });

            updateDirectLink();
        }

        // Create Form Field
        function createField(name, type, optional) {
            const labelClass = optional ? 'optional' : '';
            const required = optional ? '' : 'required';

            if (Array.isArray(type)) {
                // Select field
                return `
                    <div class="form-group">
                        <label class="${labelClass}" for="${name}">${name}</label>
                        <select id="${name}" name="${name}" ${required}>
                            <option value="">Выберите...</option>
                            ${type.map(val => `<option value="${val}">${val}</option>`).join('')}
                        </select>
                    </div>
                `;
            } else {
                // Input field
                let inputType = 'text';
                let placeholder = name;
                
                if (type === 'integer') {
                    inputType = 'number';
                    placeholder = 'Введите число';
                } else if (type === 'date') {
                    inputType = 'date';
                } else if (type === 'array') {
                    placeholder = 'Введите значения через запятую';
                }

                return `
                    <div class="form-group">
                        <label class="${labelClass}" for="${name}">${name}</label>
                        <input type="${inputType}" id="${name}" name="${name}" 
                               placeholder="${placeholder}" ${required}>
                    </div>
                `;
            }
        }

        // Update Direct Link
        function updateDirectLink() {
            const alias = document.getElementById('reportType').value;
            if (!alias) {
                document.getElementById('directLink').value = '';
                return;
            }

            const report = state.reportsConfig.reports.find(r => r.alias === alias);
            const params = new URLSearchParams();
            params.append('sport', 'football');
            params.append('type', report.required.type);

            const form = document.getElementById('reportForm');
            const formData = new FormData(form);
            
            for (const [key, value] of formData.entries()) {
                if (value && key !== 'reportType') {
                    params.append(key, value);
                }
            }

            document.getElementById('directLink').value = `${CONFIG.LEGACY_BASE}?${params.toString()}`;
        }

        // Copy Direct Link
        function copyDirectLink() {
            const input = document.getElementById('directLink');
            if (!input.value) {
                showToast('Сначала заполните форму', 'error');
                return;
            }
            
            input.select();
            document.execCommand('copy');
            showToast('Ссылка скопирована!', 'success');
        }

        // Generate Report
        async function generateReport(event) {
            event.preventDefault();
            
            const alias = document.getElementById('reportType').value;
            const report = state.reportsConfig.reports.find(r => r.alias === alias);
            
            // Collect params
            const params = { ...report.required };
            const form = document.getElementById('reportForm');
            const formData = new FormData(form);
            
            for (const [key, value] of formData.entries()) {
                if (value && key !== 'reportType') {
                    let finalValue = value;
                    
                    // Handle arrays
                    if (value.includes(',')) {
                        finalValue = value.split(',').map(v => v.trim());
                    }
                    
                    // Handle integers
                    if (report.required[key] === 'integer' || report.optional?.[key] === 'integer') {
                        finalValue = parseInt(value);
                    }
                    
                    params[key] = finalValue;
                }
            }

            const payload = {
                sport_id: 1,
                alias: alias,
                params: params
            };

            try {
                const response = await apiRequest('/api/calendar/task', 'POST', payload);
                
                if (response.hash) {
                    state.reports.set(response.hash, {
                        ...response,
                        alias: alias,
                        params: params,
                        timestamp: new Date()
                    });
                    
                    renderReports();
                    showToast('Отчет поставлен в очередь!', 'success');
                    
                    // Auto-restart if archive or error
                    if (response.status === 'archive' || response.status === 'error') {
                        await restartReport(response.hash);
                    }
                }
            } catch (error) {
                showToast('Ошибка: ' + error.message, 'error');
            }
        }

        // API Request
        async function apiRequest(path, method = 'GET', body = null) {
            const url = `${CONFIG.WORKER_URL}${path}`;
            const options = {
                method,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${state.password}`,
                    'X-Server-Type': state.selectedServer
                }
            };

            if (body) {
                options.body = JSON.stringify(body);
            }

            const response = await fetch(url, options);
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            return await response.json();
        }

        // Poll Status
        async function pollStatus() {
            if (state.reports.size === 0) return;

            const hashes = Array.from(state.reports.keys());
            
            try {
                const statuses = await apiRequest('/api/calendar/task/status', 'POST', {
                    sport_id: 1,
                    hashes: hashes
                });

                statuses.forEach(statusData => {
                    const report = state.reports.get(statusData.hash);
                    if (report) {
                        report.status = statusData.status;
                        
                        // Auto-restart if needed
                        if (statusData.status === 'archive' || statusData.status === 'error') {
                            restartReport(statusData.hash);
                        }
                    }
                });

                renderReports();
            } catch (error) {
                console.error('Poll error:', error);
            }
        }

        // Start Polling
        function startPolling() {
            if (state.pollInterval) {
                clearInterval(state.pollInterval);
            }
            state.pollInterval = setInterval(pollStatus, CONFIG.POLL_INTERVAL);
        }

        // Restart Report
        async function restartReport(hash) {
            try {
                await apiRequest(`/api/task/1/${hash}/restart`, 'POST');
                
                const report = state.reports.get(hash);
                if (report) {
                    report.status = 'in progress';
                    renderReports();
                }
                
                showToast('Отчет перезапущен', 'success');
            } catch (error) {
                showToast('Ошибка рестарта: ' + error.message, 'error');
            }
        }

        // Download Report
        async function downloadReport(hash) {
            try {
                const fileData = await apiRequest(`/api/task/1/${hash}/files`, 'GET');
                const downloadUrl = `${CONFIG.MINIO_BASE}/${fileData.bucket_name}/${fileData.file_path}`;
                
                window.open(downloadUrl, '_blank');
                showToast('Загрузка началась', 'success');
            } catch (error) {
                showToast('Ошибка загрузки: ' + error.message, 'error');
            }
        }

        // Render Reports
        function renderReports() {
            const container = document.getElementById('reportsList');
            
            if (state.reports.size === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📊</div>
                        <p>Отчеты появятся здесь после генерации</p>
                    </div>
                `;
                return;
            }

            const reportsArray = Array.from(state.reports.values()).reverse();
            
            container.innerHTML = reportsArray.map(report => `
                <div class="report-card">
                    <div class="report-header">
                        <div class="report-title">${report.alias}</div>
                        <span class="report-status status-${report.status.replace(' ', '-')}">${report.status}</span>
                    </div>
                    <div class="report-details">
                        ${new Date(report.timestamp).toLocaleString('ru-RU')}
                    </div>
                    <div class="report-hash">Hash: ${report.hash}</div>
                    <div class="report-actions">
                        ${report.status === 'done' ? 
                            `<button class="btn btn-primary btn-small" onclick="downloadReport('${report.hash}')">Скачать</button>` : 
                            ''}
                        ${report.status === 'error' || report.status === 'archive' ? 
                            `<button class="btn btn-secondary btn-small" onclick="restartReport('${report.hash}')">Рестарт</button>` : 
                            ''}
                        ${report.status === 'in progress' ? 
                            '<span class="spinner"></span> Генерация...' : 
                            ''}
                    </div>
                </div>
            `).join('');
        }

        // Show Toast
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
    </script>
</body>
</html>
